<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>📚 Book Dashboard</title>
    <style>
        /* ====== General Layout ====== */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px 35px;
        }

        h2 {
            text-align: center;
            color: #343a40;
            font-size: 28px;
            margin-bottom: 25px;
        }

        /* ====== Filter Form ====== */
        form {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        input, select {
            padding: 10px;
            width: 180px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #4e73df;
            box-shadow: 0 0 5px rgba(78,115,223,0.3);
        }

        button {
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #2e59d9;
        }

        /* ====== Table ====== */
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 12px 10px;
            text-align: center;
        }

        th {
            background-color: #4e73df;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-size: 14px;
        }

        tr:nth-child(even) {
            background-color: #f8f9fc;
        }

        tr:hover {
            background-color: #e9ecef;
        }

        td {
            color: #212529;
            font-size: 15px;
        }

        /* ====== No Data Message ====== */
        .no-data {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📘 Book List</h2>

    <!-- Filter Form -->
    <form th:action="@{/books/recommend}" method="get">
        <input type="text" name="mood" placeholder="Mood" th:value="${mood}">
        <input type="text" name="genre" placeholder="Genre" th:value="${genre}">
        <input type="number" name="year" placeholder="Publication Year" th:value="${year}">
        <input type="number" step="0.1" name="rating" placeholder="Min Rating" th:value="${rating}">
        <button type="submit">Filter</button>
    </form>

    <!-- Books Table -->
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>📖 Title</th>
            <th>✍️ Author</th>
            <th>🏷 Genre</th>
            <th>📅 Year</th>
            <th>😊 Mood</th>
            <th>⭐ Rating</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}">1</td>
            <td th:text="${book.title}">Sample Title</td>
            <td th:text="${book.author}">Sample Author</td>
            <td th:text="${book.genre}">Sample Genre</td>
            <td th:text="${book.publicationYear}">2020</td>
            <td th:text="${book.mood}">Happy</td>
            <td th:text="${book.rating}">4.5</td>
        </tr>

        <tr th:if="${books.size()} == 0">
            <td colspan="7" class="no-data">No books found.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
